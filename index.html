seX=x;this.baseY=y;this.w=w;this.h=50;this.isScored=false;this.moveType=Math.random()>0.5?'H':'V';this.offset=Math.random()*Math.PI*2;}update(score){if(score<50)return;let speed=score>=100?0.06:0.03;let range=score>=100?60:40;this.offset+=speed;if(this.moveType==='H'){this.x=this.baseX+Math.sin(this.offset)*range;}else{this.y=this.baseY+Math.cos(this.offset)*range;}}draw(camX){ctx.drawImage(imgObjs.floor,this.x-camX,this.y,this.w,this.h);}}class Game{constructor(){this.state='START';this.slinky=new Slinky();this.platforms=[];this.cameraX=0;this.score=0;this.best=localStorage.getItem('slinky_best')||0;document.getElementById('bestVal').innerText=this.best;this.drag={startX:0,startY:0,x:0,y:0,active:false};this.initGame();this.bind();}initGame(){this.cameraX=0;this.platforms=[];let startY=window.innerHeight*0.75;let p0=new Platform(60,startY,180);p0.moveType='NONE';this.platforms.push(p0);this.slinky.x=150;this.slinky.y=startY+8;this.slinky.isFlying=false;for(let i=0;i<5;i++)this.spawn();}spawn(){let last=this.platforms[this.platforms.length-1];let rx=last.baseX+200+Math.random()*100;let ry=window.innerHeight*0.4+(Math.random()*window.innerHeight*0.35);this.platforms.push(new Platform(rx,ry,130+Math.random()*50));}bind(){canvas.addEventListener('touchstart',e=>{const t=e.touches[0];if(this.state==='START'){this.initGame();this.state='PLAYING';document.getElementById('ui').style.display='block';return;}if(this.state==='GAMEOVER'){this.reset();return;}if(!this.slinky.isFlying){this.drag.active=true;this.drag.startX=t.clientX;this.drag.startY=t.clientY;}});canvas.addEventListener('touchmove',e=>{if(this.drag.active){const t=e.touches[0];this.drag.x=t.clientX-this.drag.startX;this.drag.y=t.clientY-this.drag.startY;let d=Math.min(Math.hypot(this.drag.x,this.drag.y),150);this.slinky.scaleY=1-d*0.003;this.slinky.scaleX=1+d*0.003;}});canvas.addEventListener('touchend',()=>{if(this.drag.active){this.drag.active=false;this.slinky.vx=-this.drag.x*0.14;this.slinky.vy=-this.drag.y*0.17;this.slinky.isFlying=true;this.playSnd('jump');this.drag.x=0;this.drag.y=0;}});}playSnd(k){try{sndObjs[k].currentTime=0;sndObjs[k].play();}catch(e){}}reset(){this.score=0;this.cameraX=0;document.getElementById('scoreVal').innerText=0;this.slinky.reset();this.initGame();this.state='PLAYING';}update(){if(this.state!=='PLAYING')return;this.slinky.update();let targetX=this.slinky.x-120;if(targetX>this.cameraX){this.cameraX+=(targetX-this.cameraX)*0.12;}this.platforms.forEach(p=>{if(p.moveType!=='NONE')p.update(this.score);if(this.slinky.vy>0&&this.slinky.x>p.x&&this.slinky.x<p.x+p.w&&this.slinky.y>=p.y&&this.slinky.y<=p.y+30){this.slinky.y=p.y+8;this.slinky.vy=0;this.slinky.vx=0;this.slinky.isFlying=false;if(!p.isScored){p.isScored=true;this.score++;document.getElementById('scoreVal').innerText=this.score;if(this.score>this.best){this.best=this.score;localStorage.setItem('slinky_best',this.best);document.getElementById('bestVal').innerText=this.best;}this.playSnd('land');this.spawn();}}});if(this.slinky.y>window.innerHeight+100){this.state='GAMEOVER';this.playSnd('fail');}}draw(){ctx.clearRect(0,0,canvas.width,canvas.height);if(this.state==='START'){ctx.drawImage(imgObjs.start_bg,0,0,window.innerWidth,window.innerHeight);}else{this.drawParallax();this.platforms.forEach(p=>p.draw(this.cameraX));if(this.drag.active)this.drawGuide();this.slinky.draw(this.cameraX);if(this.state==='GAMEOVER')this.drawEnd();}}drawParallax(){const w=window.innerWidth,h=window.innerHeight;ctx.drawImage(imgObjs.bg1,0,0,w,h);let p2=(this.cameraX*0.2)%w;ctx.drawImage(imgObjs.bg2,-p2,h-350,w,250);ctx.drawImage(imgObjs.bg2,w-p2,h-350,w,250);let p3=(this.cameraX*0.5)%w;ctx.drawImage(imgObjs.bg3,-p3,h-220,w,220);ctx.drawImage(imgObjs.bg3,w-p3,h-220,w,220);}drawGuide(){ctx.fillStyle="rgba(255,255,255,0.35)";let tx=this.slinky.x-this.cameraX,ty=this.slinky.y-15;let tvx=-this.drag.x*0.14,tvy=-this.drag.y*0.17;for(let i=0;i<18;i++){ctx.beginPath();ctx.arc(tx,ty,3,0,6.28);ctx.fill();tvy+=0.6;tx+=tvx*
