<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slinky Escape - Zeno Games Studio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon_ios.png">
    <style>
        * { touch-action: none !important; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden !important; background-color: #000; position: fixed; top: 0; left: 0; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: env(safe-area-inset-top, 35px); width: 100%; text-align: center; color: white; font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 100; display: none; }
        #menuBtn { position: absolute; top: env(safe-area-inset-top, 35px); right: 20px; width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; color: white; font-size: 12px; display: flex; align-items: center; justify-content: center; z-index: 200; font-family: Arial, sans-serif; font-weight: bold; pointer-events: auto; }
        #charSelect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid #00d4ff; border-radius: 20px; padding: 20px; display: none; flex-direction: column; align-items: center; z-index: 300; color: white; font-family: Arial, sans-serif; }
        .char-option { margin: 10px; padding: 10px; border: 2px solid transparent; border-radius: 10px; }
        .char-option.active { border-color: #00d4ff; background: rgba(0,212,255,0.2); }
        .char-option img { width: 80px; height: 80px; }
    </style>
</head>
<body>
    <div id="menuBtn">MENU</div>
    <div id="charSelect">
        <h3>CHỌN NHÂN VẬT</h3>
        <div style="display: flex;">
            <div class="char-option active" id="opt1"><img src="slinky.png"></div>
            <div class="char-option" id="opt2"><img src="slinky_2.png"></div>
        </div>
        <button id="closeMenu" style="margin-top:15px; padding:8px 20px; border-radius:5px; background:#00d4ff; border:none; color:black; font-weight:bold;">XÁC NHẬN</button>
    </div>
    <div id="ui">SCORE: <span id="scoreVal">0</span> | BEST: <span id="bestVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
/** * Slinky Escape - Final Fixed Version
 * Zeno Games Studio - Fix Audio Shuffling
 */

const _0x5f21=['\x6a\x75\x6d\x70','\x6c\x61\x6e\x64','\x66\x61\x69\x6c','\x73\x6c\x69\x6e\x6b\x79','\x73\x6c\x69\x6e\x6b\x79\x5f\x32'];
(function(_0x1b2c3d,_0x5f21aa){const _0x4d3e2f=function(_0x3a2b1c){while(--_0x3a2b1c){_0x1b2c3d['push'](_0x1b2c3d['shift']());}};_0x4d3e2f(++_0x5f21aa);}(_0x5f21,0x1b8));

// Tìm chính xác từ khóa trong mảng đã xáo trộn để không bao giờ bị sai âm thanh
const getS = (key) => _0x5f21.find(s => s.includes(key));

window.addEventListener('touchmove',(e)=>{if(e.cancelable)e.preventDefault();},{passive:false});
const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;
function resize(){canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';ctx.scale(dpr,dpr);}
window.addEventListener('resize',resize);resize();

const assets={
    images:{start_bg:'start_bg.png',bg1:'bg1.jpg',bg2:'bg2.png',bg3:'bg3.png',slinky:'slinky.png',slinky_2:'slinky_2.png',floor:'floor.png'},
    sounds:{jump:'jump.mp3',land:'land.mp3',fail:'fail.mp3'}
};
const imgObjs={};const sndObjs={};let loadedCount=0;const totalAssets=Object.keys(assets.images).length;

function loadAssets(callback){
    for(let key in assets.images){
        const img=new Image();
        img.onload=()=>{if(++loadedCount===totalAssets) callback();};
        img.src=assets.images[key];
        imgObjs[key]=img;
    }
    for(let key in assets.sounds){
        sndObjs[key]=new Audio(assets.sounds[key]);
        sndObjs[key].load();
    }
}

class Player{
    constructor(){this.size=65;this.skin='slinky';this.reset();}
    reset(){this.x=150;this.y=0;this.vx=0;this.vy=0;this.isFlying=false;this.gravity=0.6;this.scaleX=1;this.scaleY=1;this.rotation=0;}
    update(){
        if(this.isFlying){
            this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;
            let speed=Math.sqrt(this.vx**2+this.vy**2);
            this.scaleY=1+speed*0.015;this.scaleX=1/this.scaleY;
            this.rotation=Math.atan2(this.vy,this.vx)+Math.PI/2;
        }else{
            this.rotation=0;this.scaleY=1+Math.sin(Date.now()*0.008)*0.05;this.scaleX=1/this.scaleY;
        }
    }
    draw(cameraX){
        let currentImg=imgObjs[this.skin];
        if(!currentImg) return;
        ctx.save();ctx.translate(this.x-cameraX,this.y);ctx.rotate(this.rotation);ctx.scale(this.scaleX,this.scaleY);
        ctx.drawImage(currentImg,-this.size/2,-this.size+15,this.size,this.size);ctx.restore();
    }
}

class Platform{
    constructor(x,y,w){this.x=x;this.y=y;this.baseX=x;this.baseY=y;this.w=w;this.h=50;this.isScored=false;this.moveType=Math.random()>0.5?'H':'V';this.angle=Math.random()*Math.PI*2;}
    update(score){
        if(score<50) return;
        let speed=score>=100?0.06:0.03;let range=score>=100?65:40;
        this.angle+=speed;
        if(this.moveType==='H') this.x=this.baseX+Math.sin(this.angle)*range;
        else this.y=this.baseY+Math.cos(this.angle)*range;
    }
    draw(cameraX){ctx.drawImage(imgObjs['floor'],this.x-cameraX,this.y,this.w,this.h);}
}

class CoreGame{
    constructor(){
        this.state='START';this.player=new Player();this.platforms=[];this.cameraX=0;this.score=0;
        this.best=localStorage.getItem('slinky_best')||0;
        document.getElementById('bestVal').innerText=this.best;
        this.touch={startX:0,startY:0,curX:0,curY:0,active:false};
        this.init();this.events();
    }
    init(){
        this.cameraX=0;this.platforms=[];let startY=window.innerHeight*0.75;
        let p0=new Platform(60,startY,180);p0.moveType='NONE';this.platforms.push(p0);
        this.player.x=150;this.player.y=startY+8;this.player.isFlying=false;
        for(let i=0;i<5;i++)this.addPlatform();
    }
    addPlatform(){
        let last=this.platforms[this.platforms.length-1];
        let rx=last.baseX+200+Math.random()*100;
        let ry=window.innerHeight*0.35+(Math.random()*window.innerHeight*0.4);
        this.platforms.push(new Platform(rx,ry,130+Math.random()*50));
    }
    events(){
        document.getElementById('menuBtn').addEventListener('touchstart',(e)=>{e.stopPropagation();document.getElementById('charSelect').style.display='flex';});
        document.getElementById('opt1').onclick=()=>{this.player.skin='slinky';this.updateUI(1);};
        document.getElementById('opt2').onclick=()=>{this.player.skin='slinky_2';this.updateUI(2);};
        document.getElementById('closeMenu').onclick=()=>{document.getElementById('charSelect').style.display='none';};

        canvas.addEventListener('touchstart',e=>{
            if(document.getElementById('charSelect').style.display==='flex') return;
            const t=e.touches[0];
            if(this.state==='START'){this.state='PLAYING';document.getElementById('ui').style.display='block';return;}
            if(this.state==='GAMEOVER'){this.reset();return;}
            if(!this.player.isFlying){this.touch.active=true;this.touch.startX=t.clientX;this.touch.startY=t.clientY;}
        });
        canvas.addEventListener('touchmove',e=>{
            if(this.touch.active){
                const t=e.touches[0];this.touch.curX=t.clientX-this.touch.startX;this.touch.curY=t.clientY-this.touch.startY;
                let dist=Math.min(Math.hypot(this.touch.curX,this.touch.curY),150);
                this.player.scaleY=1-dist*0.003;this.player.scaleX=1+dist*0.003;
            }
        });
        canvas.addEventListener('touchend',()=>{
            if(this.touch.active){
                this.touch.active=false;this.player.vx=-this.touch.curX*0.14;this.player.vy=-this.touch.curY*0.17;
                this.player.isFlying=true;
                this.playSound(getS('jump')); 
                this.touch.curX=0;this.touch.curY=0;
            }
        });
    }
    updateUI(n){
        document.getElementById('opt1').classList.toggle('active',n===1);
        document.getElementById('opt2').classList.toggle('active',n===2);
    }
    playSound(k){try{if(sndObjs[k]){sndObjs[k].currentTime=0;sndObjs[k].play();}}catch(e){}}
    reset(){this.score=0;this.cameraX=0;document.getElementById('scoreVal').innerText=0;this.player.reset();this.init();this.state='PLAYING';}
    update(){
        if(this.state!=='PLAYING') return;this.player.update();
        let targetX=this.player.x-120;if(targetX>this.cameraX)this.cameraX+=(targetX-this.cameraX)*0.12;
        this.platforms.forEach(p=>{
            if(p.moveType!=='NONE')p.update(this.score);
            if(this.player.vy>0&&this.player.x>p.x&&this.player.x<p.x+p.w&&this.player.y>=p.y&&this.player.y<=p.y+30){
                this.player.y=p.y+8;this.player.vy=0;this.player.vx=0;this.player.isFlying=false;
                if(!p.isScored){
                    p.isScored=true;this.score++;document.getElementById('scoreVal').innerText=this.score;
                    if(this.score>this.best){this.best=this.score;localStorage.setItem('slinky_best',this.best);document.getElementById('bestVal').innerText=this.best;}
                    this.playSound(getS('land'));
                    this.addPlatform();
                }
            }
        });
        if(this.player.y>window.innerHeight+100){this.state='GAMEOVER';this.playSound(getS('fail'));}
    }
    draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(this.state==='START')ctx.drawImage(imgObjs['start_bg'],0,0,window.innerWidth,window.innerHeight);
        else{this.drawBG();this.platforms.forEach(p=>p.draw(this.cameraX));if(this.touch.active)this.drawTrajectory();this.player.draw(this.cameraX);if(this.state==='GAMEOVER')this.drawGameOver();}
    }
    drawBG(){
        const w=window.innerWidth,h=window.innerHeight;ctx.drawImage(imgObjs['bg1'],0,0,w,h);
        let p2=(this.cameraX*0.2)%w;ctx.drawImage(imgObjs['bg2'],-p2,h-350,w,250);ctx.drawImage(imgObjs['bg2'],w-p2,h-350,w,250);
        let p3=(this.cameraX*0.5)%w;ctx.drawImage(imgObjs['bg3'],-p3,h-220,w,220);ctx.drawImage(imgObjs['bg3'],w-p3,h-220,w,220);
    }
    drawTrajectory(){
        ctx.fillStyle="rgba(255,255,255,0.35)";let tx=this.player.x-this.cameraX,ty=this.player.y-15;let tvx=-this.touch.curX*0.14,tvy=-this.touch.curY*0.17;
        for(let i=0;i<18;i++){ctx.beginPath();ctx.arc(tx,ty,3,0,6.28);ctx.fill();tvy+=0.6;tx+=tvx*1.8;ty+=tvy*1.8;}
    }
    drawGameOver(){
        ctx.fillStyle="rgba(0,0,0,0.75)";ctx.fillRect(0,0,window.innerWidth,window.innerHeight);ctx.fillStyle="white";ctx.textAlign="center";ctx.font="bold 32px Arial";
        ctx.fillText("GAME OVER",window.innerWidth/2,window.innerHeight/2-20);ctx.font="20px Arial";ctx.fillText("Chạm để chơi lại",window.innerWidth/2,window.innerHeight/2+40);
    }
}

loadAssets(()=>{const game=new CoreGame();function loop(){game.update();game.draw();requestAnimationFrame(loop);}loop();});
</script>
</body>
</html>
